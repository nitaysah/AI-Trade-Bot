<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trader BOT — Secure Access</title>
    <meta name="description"
        content="AI-powered quantitative trading dashboard with multi-indicator confluence and sentiment analysis.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.15);
        }
        .google-btn {
            background: white;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .google-btn:hover {
            border-color: #d1d5db;
            background: #f9fafb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px -1px rgba(0, 0, 0, 0.05);
        }
        .google-btn:active {
            transform: translateY(0px);
            background: #f3f4f6;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-fuchsia-50 via-purple-100 to-indigo-100 text-indigo-950 min-h-screen font-sans relative overflow-hidden"
    style="font-family: 'Inter', sans-serif;">
    
    <!-- Ethereal background overlay -->
    <div
        class="fixed inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-white/80 via-purple-200/20 to-transparent">
    </div>
    <div
        class="fixed inset-0 z-[-1] bg-[radial-gradient(ellipse_at_bottom_right,_var(--tw-gradient-stops))] from-indigo-200/30 via-transparent to-transparent">
    </div>

    <div class="max-w-[1440px] mx-auto px-4 h-screen flex flex-col">

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center py-8 border-b border-purple-200/80 mb-auto">
            <div>
                <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-600 via-purple-600 to-indigo-600 leading-tight">
                    ✦ AI Trader BOT
                </h1>
                <p class="text-purple-500 text-sm mt-1 font-medium tracking-tight">Automated Quantitative Trading System</p>
            </div>
            <div class="hidden md:flex items-center gap-3">
                <span class="px-3 py-1 bg-white/50 rounded-full text-[10px] font-black text-indigo-500 tracking-[0.2em] uppercase border border-white">v2.0 Stable</span>
            </div>
        </header>

        <main class="flex-grow flex items-center justify-center pb-24">
            <div class="login-card p-12 rounded-[3rem] w-full max-w-md text-center border-white/50">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-tr from-fuchsia-50 to-indigo-50 rounded-3xl mb-8 shadow-sm border border-white">
                    <span class="text-4xl">📡</span>
                </div>
                <h2 class="text-3xl font-black text-indigo-950 mb-3">Initialize Link</h2>
                <p class="text-slate-500 font-semibold mb-10 text-sm leading-relaxed">Secure access to Elite Command Center</p>
                
                <button id="loginBtn" class="google-btn w-full flex items-center justify-center gap-4 py-4 px-8 rounded-2xl font-bold text-sm shadow-sm transition-all">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>

                <div id="status" class="mt-8 text-xs font-black text-purple-500 uppercase tracking-widest opacity-0 transition-opacity">
                    Establishing Secure Link...
                </div>
            </div>
        </main>

        <footer class="py-8 text-center border-t border-purple-200/30">
            <p class="text-[10px] text-indigo-400 font-black tracking-[0.3em] uppercase">&copy; 2026 Elite Quant Group • All Systems Operational</p>
        </footer>
    </div>

    <!-- Firebase Config & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('loginBtn');
        const status = document.getElementById('status');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                status.innerText = "Link Established. Initializing...";
                status.classList.remove('opacity-0');
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            }
        });

        loginBtn.addEventListener('click', async () => {
            try {
                loginBtn.disabled = true;
                loginBtn.innerHTML = `
                    <svg class="animate-spin -ml-1 mr-3 h-4 w-4 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Initializing...
                `;
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Auth Error:", error);
                status.innerText = "Link Failure. Please retry.";
                status.classList.remove('opacity-0');
                loginBtn.disabled = false;
                loginBtn.innerHTML = `
                    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                `;
            }
        });
    </script>
</body>
</html>
