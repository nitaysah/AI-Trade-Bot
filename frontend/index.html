<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trader BOT — Secure Access</title>
    <meta name="description"
        content="AI-powered quantitative trading dashboard with multi-indicator confluence and sentiment analysis.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px -5px rgba(139, 92, 246, 0.2);
        }
        .google-btn {
            background: white;
            color: #4338ca;
            border: 1px solid #e0e7ff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .google-btn:hover {
            border-color: #6366f1;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px -2px rgba(99, 102, 241, 0.15);
        }
        .shimmer-bg {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-fuchsia-50 via-purple-100 to-indigo-100 text-indigo-950 min-h-screen font-sans relative overflow-hidden"
    style="font-family: 'Inter', sans-serif;">
    
    <!-- Ethereal background overlay (Synced with Dashboard) -->
    <div
        class="fixed inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-white/80 via-purple-200/20 to-transparent">
    </div>
    <div
        class="fixed inset-0 z-[-1] bg-[radial-gradient(ellipse_at_bottom_right,_var(--tw-gradient-stops))] from-indigo-200/30 via-transparent to-transparent">
    </div>

    <div class="max-w-[1440px] mx-auto px-4 h-screen flex flex-col">

        <!-- ═══════════════ SYNCED HEADER ═══════════════ -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center py-6 border-b border-purple-200/80 mb-auto">
            <div>
                <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-600 via-purple-600 to-indigo-600 leading-tight">
                    ✦ AI Trader BOT
                </h1>
                <p class="text-purple-500 text-sm mt-1 font-medium">Automated Quantitative Trading System</p>
            </div>
            <div class="hidden md:flex items-center gap-3">
                <span class="text-xs font-bold text-indigo-400 tracking-widest uppercase">Security Protocol v2.0</span>
            </div>
        </header>

        <!-- ═══════════════ LOGIN CENTER ═══════════════ -->
        <main class="flex-grow flex items-center justify-center pb-24">
            <div class="login-card p-10 rounded-[2.5rem] w-full max-w-md text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-fuchsia-100 to-indigo-100 rounded-2xl mb-6 shadow-sm">
                    <span class="text-3xl">📡</span>
                </div>
                <h2 class="text-2xl font-black text-indigo-950 mb-2">Initialize Link</h2>
                <p class="text-slate-500 font-medium mb-8">Secure access to Elite Command Center</p>
                
                <button id="loginBtn" class="google-btn w-full flex items-center justify-center gap-3 py-4 px-6 rounded-2xl font-bold text-sm shadow-sm">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google" class="w-5 h-5">
                    Continue with Google
                </button>

                <div id="status" class="mt-6 text-xs font-bold text-purple-500 uppercase tracking-tighter opacity-0 transition-opacity">
                    Syncing with satellite...
                </div>
            </div>
        </main>

        <footer class="py-6 text-center border-t border-purple-200/40">
            <p class="text-xs text-indigo-300 font-bold tracking-widest uppercase">&copy; 2026 Elite Quant Group • All Systems Operational</p>
        </footer>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr9C32u2x7cKl3UUrBjHhRlQbp_1HeErU",
            authDomain: "trading-bot-engine-df3de.firebaseapp.com",
            projectId: "trading-bot-engine-df3de",
            storageBucket: "trading-bot-engine-df3de.firebasestorage.app",
            messagingSenderId: "946557219642",
            appId: "1:946557219642:web:0f1fea143cfe1accbbd603"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('loginBtn');
        const status = document.getElementById('status');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                status.innerText = "Access Granted. Initializing Hub...";
                status.classList.remove('opacity-0');
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 800);
            }
        });

        loginBtn.addEventListener('click', async () => {
            try {
                loginBtn.disabled = true;
                loginBtn.classList.add('opacity-50', 'cursor-not-allowed');
                loginBtn.innerText = "Requesting Link...";
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Auth Error:", error);
                status.innerText = "Link Interrupted. Try again.";
                status.classList.remove('opacity-0');
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                loginBtn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google" class="w-5 h-5"> Continue with Google`;
            }
        });
    </script>
</body>
</html>
