<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Command Center | Secure Link</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050208 100%);
            font-family: 'Inter', sans-serif;
        }

        /* Animated Stars Background */
        #stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: card-entry 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes card-entry {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-ring {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            border: 2px solid #a855f7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
        }

        .logo-ring::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .bot-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px #a855f7);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: white;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
        }

        .google-btn {
            background: white;
            color: #1f2937;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 0 20px rgba(168, 85, 247, 0.4);
            background: #f9fafb;
        }

        .google-btn img {
            width: 24px;
            height: 24px;
        }

        .status-msg {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #a855f7;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .loading-shimmer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 100;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="stars-container"></div>
    <div class="loading-shimmer" id="loader"></div>

    <div class="login-container">
        <div class="glass-card">
            <div class="logo-ring">
                <span class="bot-icon">🛸</span>
            </div>
            <h1>Command Center</h1>
            <p>Initialize secure neural link</p>
            
            <button class="google-btn" id="loginBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google">
                Initialize with Google
            </button>
            <div class="status-msg" id="status">Syncing with satellite...</div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            authDomain: "celestial-fortune-7d9b4.firebaseapp.com",
            projectId: "celestial-fortune-7d9b4",
            storageBucket: "celestial-fortune-7d9b4.firebasestorage.app",
            messagingSenderId: "1077198186521",
            appId: "1:1077198186521:web:d769634e207d5705307044"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('loginBtn');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        // Stars Generation
        const starsContainer = document.getElementById('stars-container');
        for(let i=0; i<150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            const size = Math.random() * 3;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${2 + Math.random() * 4}s`);
            starsContainer.appendChild(star);
        }

        // Handle Auth State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                status.innerText = "Access Granted. Initializing Dashboard...";
                status.style.opacity = "1";
                loader.style.display = "block";
                setTimeout(() => {
                    loader.style.opacity = "1";
                    window.location.href = "index.html";
                }, 1000);
            }
        });

        // Handle Login Click
        loginBtn.addEventListener('click', async () => {
            try {
                loginBtn.disabled = true;
                loginBtn.innerText = "Requesting Link...";
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Auth Error:", error);
                status.innerText = "Link Interrupted. Try again.";
                status.style.opacity = "1";
                loginBtn.disabled = false;
                loginBtn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google"> Initialize with Google`;
            }
        });
    </script>
</body>
</html>
