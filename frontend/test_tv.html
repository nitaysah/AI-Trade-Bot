<!DOCTYPE html>
<html>
<head><script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script></head>
<body>
<div id="chart"></div>
<script>
var widget = new TradingView.widget({
  "autosize": true,
  "symbol": "AAPL",
  "interval": "D",
  "container_id": "chart"
});
widget.onChartReady(function() {
  console.log("Ready");
  widget.chart().onIntervalChanged().subscribe(null, function(interval) {
    console.log("Interval changed to", interval);
  });
});
</script>
</body>
</html>
