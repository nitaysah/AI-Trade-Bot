version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: always

# Note: For Google Cloud Run, you only need the Dockerfile.
# This compose file is for local development and testing.
